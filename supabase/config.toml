# Supabase project config. project_id must match your Supabase project ref.
project_id = "cpudfwfepexswgmqdbnm"

[functions.webauthn]
# The function verifies the Supabase JWT itself only where needed (registration).
# auth-options / auth-verify run BEFORE a session exists, so the platform-level
# JWT gate must be off — otherwise unauthenticated Face ID login can't call it.
verify_jwt = false

[functions.ical-sync]
# Called from the browser to sync a calendar feed; no user JWT needed and the
# CORS preflight must pass, so keep the platform JWT gate off.
verify_jwt = false

[functions.notify-user]
# Delivers a cross-user notification (customer -> agent). The function verifies
# the caller's JWT itself + checks they own the job, so keep the platform gate
# off for the CORS preflight.
verify_jwt = false

[functions.ical-export]
# Public combined-iCal feed fetched anonymously by Airbnb/Booking; guarded by a
# per-property token in the query string, so the platform JWT gate must be off.
verify_jwt = false

[functions.join-property]
# A partner joins a shared property by code. Verifies the caller's JWT itself;
# platform gate off so the CORS preflight passes.
verify_jwt = false

[functions.agent-job-update]
# Agent accept/decline/complete on a job they don't own as customer. Verifies
# the caller is the job's cleaner itself; platform gate off for the preflight.
verify_jwt = false
